<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magic Translator</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      width: 100%;
      max-width: 800px;
    }

    h1 {
      text-align: center;
      color: #4a4a8a;
      font-size: 2rem;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: #888;
      font-size: 0.95rem;
      margin-bottom: 32px;
    }

    label.field-label {
      display: block;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }

    textarea {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      resize: vertical;
      min-height: 100px;
      transition: border-color 0.2s;
      color: #333;
    }

    textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    .languages-section {
      margin-top: 24px;
    }

    .languages-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .lang-checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.2s, background-color 0.2s;
      user-select: none;
    }

    .lang-checkbox:hover {
      border-color: #667eea;
      background-color: #f5f5ff;
    }

    .lang-checkbox input[type="checkbox"] {
      accent-color: #667eea;
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .lang-checkbox.checked {
      border-color: #667eea;
      background-color: #eef0ff;
    }

    .lang-checkbox span {
      font-size: 0.9rem;
      color: #444;
    }

    .actions {
      margin-top: 28px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      padding: 12px 28px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
    }

    button:active {
      transform: scale(0.97);
    }

    #translate-btn {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    #translate-btn:hover:not(:disabled) {
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }

    #translate-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #select-all-btn {
      background: #f0f0f0;
      color: #555;
    }

    #select-all-btn:hover {
      background: #e4e4e4;
    }

    .results-section {
      margin-top: 36px;
    }

    .results-section h2 {
      color: #4a4a8a;
      font-size: 1.2rem;
      margin-bottom: 16px;
    }

    .result-card {
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 12px;
      background: #fafafa;
    }

    .result-lang {
      font-weight: 700;
      font-size: 0.85rem;
      color: #667eea;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .result-text {
      font-size: 1rem;
      color: #333;
      line-height: 1.6;
      word-break: break-word;
    }

    .error-msg {
      color: #e53e3e;
      background: #fff5f5;
      border: 1px solid #feb2b2;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.95rem;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 3px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🪄 Magic Translator</h1>
    <p class="subtitle">Translate text into multiple languages at once</p>

    <form id="translate-form" onsubmit="handleSubmit(event)">
      <label class="field-label" for="source-text">Text to translate</label>
      <textarea id="source-text" placeholder="Type or paste text here…" required></textarea>

      <div class="languages-section">
        <label class="field-label">Target languages</label>
        <div class="languages-grid" id="languages-grid"></div>
      </div>

      <div class="actions">
        <button type="submit" id="translate-btn">Translate</button>
        <button type="button" id="select-all-btn" onclick="toggleSelectAll()">Select all</button>
      </div>
    </form>

    <div class="results-section hidden" id="results-section">
      <h2>Translations</h2>
      <div id="results-container"></div>
    </div>
  </div>

  <script>
    const LANGUAGES = [
      { code: "en", name: "English" },
      { code: "es", name: "Spanish" },
      { code: "fr", name: "French" },
      { code: "de", name: "German" },
      { code: "it", name: "Italian" },
      { code: "pt", name: "Portuguese" },
      { code: "ru", name: "Russian" },
      { code: "zh", name: "Chinese" },
      { code: "ja", name: "Japanese" },
      { code: "ko", name: "Korean" },
      { code: "ar", name: "Arabic" },
      { code: "hi", name: "Hindi" },
      { code: "he", name: "Hebrew" },
      { code: "tr", name: "Turkish" },
      { code: "pl", name: "Polish" },
      { code: "nl", name: "Dutch" },
      { code: "sv", name: "Swedish" },
      { code: "vi", name: "Vietnamese" },
      { code: "th", name: "Thai" },
      { code: "uk", name: "Ukrainian" },
    ];

    // Build language checkboxes
    const grid = document.getElementById("languages-grid");
    LANGUAGES.forEach(({ code, name }) => {
      const label = document.createElement("label");
      label.className = "lang-checkbox";
      label.innerHTML = `
        <input type="checkbox" name="lang" value="${code}" onchange="updateCheckboxStyle(this)" />
        <span>${name}</span>
      `;
      grid.appendChild(label);
    });

    function updateCheckboxStyle(checkbox) {
      const label = checkbox.closest(".lang-checkbox");
      if (checkbox.checked) {
        label.classList.add("checked");
      } else {
        label.classList.remove("checked");
      }
    }

    let allSelected = false;
    function toggleSelectAll() {
      allSelected = !allSelected;
      document.querySelectorAll('input[name="lang"]').forEach(cb => {
        cb.checked = allSelected;
        updateCheckboxStyle(cb);
      });
      document.getElementById("select-all-btn").textContent = allSelected ? "Deselect all" : "Select all";
    }

    async function handleSubmit(event) {
      event.preventDefault();

      const text = document.getElementById("source-text").value.trim();
      const selectedLangs = Array.from(
        document.querySelectorAll('input[name="lang"]:checked')
      ).map(cb => cb.value);

      if (!text) {
        showError("Please enter text to translate.");
        return;
      }
      if (selectedLangs.length === 0) {
        showError("Please select at least one language.");
        return;
      }

      setLoading(true);
      clearResults();

      try {
        const response = await fetch("/translate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text, languages: selectedLangs }),
        });

        if (!response.ok) {
          const err = await response.json().catch(() => ({ detail: "Unknown error" }));
          throw new Error(err.detail || `Server error ${response.status}`);
        }

        const result = await response.json();
        showResults(result, selectedLangs);
      } catch (err) {
        showError(err.message || "Translation failed. Please try again.");
      } finally {
        setLoading(false);
      }
    }

    function setLoading(loading) {
      const btn = document.getElementById("translate-btn");
      if (loading) {
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Translating…';
      } else {
        btn.disabled = false;
        btn.innerHTML = "Translate";
      }
    }

    function clearResults() {
      document.getElementById("results-section").classList.add("hidden");
      document.getElementById("results-container").innerHTML = "";
    }

    function showResults(result, orderedLangs) {
      const container = document.getElementById("results-container");
      container.innerHTML = "";

      orderedLangs.forEach(code => {
        if (result[code] !== undefined) {
          const langName = LANGUAGES.find(l => l.code === code)?.name || code;
          const card = document.createElement("div");
          card.className = "result-card";
          card.innerHTML = `
            <div class="result-lang">${langName} (${code})</div>
            <div class="result-text">${escapeHtml(result[code])}</div>
          `;
          container.appendChild(card);
        }
      });

      document.getElementById("results-section").classList.remove("hidden");
    }

    function showError(message) {
      const container = document.getElementById("results-container");
      container.innerHTML = `<div class="error-msg">⚠️ ${escapeHtml(message)}</div>`;
      document.getElementById("results-section").classList.remove("hidden");
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
